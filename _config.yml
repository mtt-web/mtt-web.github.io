# Welcome to Jekyll!
#
# Site settings

title: "Ing. Martin Timothy Timko"
email: "martin.timko@aol.com"

description: >-
  Personal webpage of Martin Timothy Timko

baseurl: ""
url: ""

github_username: "indicatrix-git"
repository: "mtt-web/mtt-web.github.io"

# Build settings
remote_theme: "mmistakes/minimal-mistakes@4.26.2"
minimal_mistakes_skin: "air"

plugins:
  - jekyll-feed
  - jekyll-include-cache

kramdown:
  math_engine: katex

locale: "en-GB"

author:
  # name: "Martin Timothy Timko"
  avatar: "/assets/images/photos/my-photo.png"
  bio: "I'm a freelance programmer."
  location: "Kosice, Slovak Republic"

  links:
    - label: "[name].[surname]@aol.com"
      icon: "fas fa-fw fa-envelope"
      url: "mailto:martin.timko@aol.com"

    - label: "MTT Web"
      icon: "fas fa-fw fa-globe"
      url: "http://mttweb.aspfree.cz"
      target: "_blank"
      rel: "noopener noreferrer"

    - label: "Indicatrix Blog"
      icon: "fas fa-fw fa-blog"
      url: "https://indicatrixblog.blogspot.com/"
      target: "_blank"
      rel: "noopener noreferrer"

    - label: "Indicatrix Tech Blog"
      icon: "fas fa-fw fa-compass"
      url: "http://indicatrix.wz.cz:8080/"
      target: "_blank"
      rel: "noopener noreferrer"

    - label: "SoundCloud"
      icon: "fab fa-fw fa-soundcloud"
      url: "https://soundcloud.com/martin-timothy-timko"
      target: "_blank"
      rel: "noopener noreferrer"

    - label: "GitHub – indicatrix-git"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/indicatrix-git"
      target: "_blank"
      rel: "noopener noreferrer"

    - label: "YouTube – Martin Timothy Timko"
      icon: "fab fa-fw fa-youtube"
      url: "https://www.youtube.com/@martin-timothy-timko"
      target: "_blank"
      rel: "noopener noreferrer"

date_format: "%B %Y"

# Front matter defaults
defaults:
  # _posts
  - scope:
      path: ""
      type: "posts"

    values:
      layout: "single"
      author_profile: true
      classes: "wide"
      related: true
      show_date: true

  # _pages
  - scope:
      path: ""
      type: "pages"

    values:
      layout: "single"
      author_profile: true
      classes: "wide"

atom_feed:
  hide: true

# Exclude from processing
exclude:
  - vendor/
  - .bundle/
  - Gemfile
  - Gemfile.lock
  - teaching/pagerank/node_modules/
  - teaching/metropolis-demo/
  - teaching/landscape-demo/node_modules/
  - teaching/markov-chain-demo/node_modules/
  - widgets/node_modules/
  - widgets/src/
  - widgets/package.json
  - widgets/package-lock.json
  - widgets/vite.config.js
  - widgets/.gitignore
  - widgets/public/
  - widgets/preview.html
  - widgets/preview-dist.html
  - widgets/README.md
  - widgets/charts.js
  - widgets/helpers.js
  - widgets/index.html
  - widgets/geography.html

# Include build output
include:
  - widgets/dist/

footer:
  content: "Powered by Jekyll & Minimal Mistakes."

zoom: true
